name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            target_os: darwin
            target_arch: arm64
            electron_target: "--mac dmg --arm64"
          - label: macOS x64
            runner: macos-15-intel
            target_os: darwin
            target_arch: x64
            electron_target: "--mac dmg --x64"
          - label: Windows x64
            runner: windows-latest
            target_os: win32
            target_arch: x64
            electron_target: "--win nsis --x64"
          - label: Linux x64
            runner: ubuntu-22.04
            target_os: linux
            target_arch: x64
            electron_target: "--linux AppImage deb --x64"
          - label: Linux arm64
            runner: ubuntu-22.04-arm
            target_os: linux
            target_arch: arm64
            electron_target: "--linux AppImage --arm64"

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install root deps
        run: npm ci --no-audit --no-fund

      - name: Build web UI (vendor/hermes-web-ui)
        run: |
          cd vendor/hermes-web-ui
          npm ci --no-audit --no-fund
          npm run build
          npm prune --omit=dev

      - name: Fetch bundled Python
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: node scripts/fetch-python.mjs

      - name: Install hermes-agent into bundled Python
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: node scripts/install-hermes.mjs

      - name: Apply local hermes-agent patches
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: node scripts/apply-hermes-patches.mjs

      - name: Prune bundled Python
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: node scripts/prune-python.mjs

      - name: Compile main process
        run: npm run build:main

      - name: Build (electron-builder, no publish)
        run: npx electron-builder ${{ matrix.electron_target }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.exe
            release/*.exe.blockmap
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets (clobber)"
            gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              artifacts/*
          fi
