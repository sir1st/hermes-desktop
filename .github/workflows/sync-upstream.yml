name: Sync upstream submodules

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Detect upstream changes
        id: diff
        run: |
          cd vendor/hermes-web-ui
          OLD=$(git rev-parse HEAD)
          git fetch origin main --quiet
          NEW=$(git rev-parse origin/main)
          if [ "$OLD" = "$NEW" ]; then
            echo "✓ Already up to date at $OLD"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(git rev-list --count "$OLD..$NEW")
          echo "↑ Upstream advanced by $COUNT commits ($OLD → $NEW)"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "old_sha=$OLD" >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW" >> "$GITHUB_OUTPUT"
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Skip if a sync PR is already open
        if: steps.diff.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list --repo "$GITHUB_REPOSITORY" --label "auto-sync" --state open --json number --jq 'length')
          if [ "$OPEN" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        id: version
        run: |
          CUR=$(jq -r .version package.json)
          NEXT=$(echo "$CUR" | awk -F. '{print $1"."$2"."$3+1}')
          echo "current=$CUR" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $CUR → $NEXT"

      - name: Sanity-check that bundled patches still apply
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        id: patch-check
        continue-on-error: true
        run: |
          set -e
          cd vendor/hermes-web-ui
          git checkout "${{ steps.diff.outputs.new_sha }}"
          npm ci --no-audit --no-fund
          npm run build
          npm prune --omit=dev
          cd ../..
          if node scripts/apply-webui-patches.mjs 2>&1 | tee /tmp/patch.log; then
            if grep -q "anchor not found" /tmp/patch.log; then
              echo "patches_ok=false" >> "$GITHUB_OUTPUT"
            else
              echo "patches_ok=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "patches_ok=false" >> "$GITHUB_OUTPUT"
          fi
          cd vendor/hermes-web-ui
          git reset --hard "${{ steps.diff.outputs.new_sha }}"

      - name: Update submodule pointer + version + lockfile
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        run: |
          git -C vendor/hermes-web-ui checkout "${{ steps.diff.outputs.new_sha }}"
          jq --arg v "${{ steps.version.outputs.next }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          npm install --package-lock-only --no-audit --no-fund || true

      - name: Open sync PR + auto-merge
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_SHA: ${{ steps.diff.outputs.old_sha }}
          NEW_SHA: ${{ steps.diff.outputs.new_sha }}
          COMMIT_COUNT: ${{ steps.diff.outputs.commit_count }}
          OLD_VER: ${{ steps.version.outputs.current }}
          NEW_VER: ${{ steps.version.outputs.next }}
          PATCHES_OK: ${{ steps.patch-check.outputs.patches_ok }}
        run: bash .github/scripts/open-sync-pr.sh
