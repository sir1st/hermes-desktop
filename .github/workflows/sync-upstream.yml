name: Sync upstream submodules

on:
  schedule:
    # Off-peak minutes (2,7,12,...,57) — avoids the global :00/:05/:10 cron
    # stampede that causes GitHub Actions to silently drop scheduled runs.
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules (PAT so subsequent push triggers workflows)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Detect a new upstream RELEASE (npm registry), not just a new main HEAD.
      # Mid-flight master commits don't trigger us — only published versions do.
      - name: Detect new upstream release on npm
        id: diff
        run: |
          set -e
          CUR_VER=$(jq -r .version vendor/hermes-web-ui/package.json)
          NPM_VER=$(curl -fsSL https://registry.npmjs.org/hermes-web-ui/latest | jq -r .version)
          if [ -z "$NPM_VER" ] || [ "$NPM_VER" = "null" ]; then
            echo "✗ Failed to read latest version from npm" >&2
            exit 1
          fi
          echo "vendored: $CUR_VER   npm latest: $NPM_VER"
          if [ "$CUR_VER" = "$NPM_VER" ]; then
            echo "✓ Already on upstream v$CUR_VER"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Resolve npm version → git tag (`v<version>`). Tag must exist upstream.
          TAG="v${NPM_VER}"
          cd vendor/hermes-web-ui
          git fetch origin --tags --quiet
          if ! NEW_SHA=$(git rev-parse "refs/tags/${TAG}^{commit}" 2>/dev/null); then
            echo "✗ npm published $NPM_VER but git tag $TAG not found upstream — skipping" >&2
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OLD_SHA=$(git rev-parse HEAD)
          COUNT=$(git rev-list --count "$OLD_SHA..$NEW_SHA" 2>/dev/null || echo "?")
          echo "↑ Upstream released v$NPM_VER ($COUNT commits since current)"
          echo "changed=true"      >> "$GITHUB_OUTPUT"
          echo "old_sha=$OLD_SHA"  >> "$GITHUB_OUTPUT"
          echo "new_sha=$NEW_SHA"  >> "$GITHUB_OUTPUT"
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "old_upstream_ver=$CUR_VER" >> "$GITHUB_OUTPUT"
          echo "new_upstream_ver=$NPM_VER" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$TAG"  >> "$GITHUB_OUTPUT"

      - name: Skip if a sync PR is already open
        if: steps.diff.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh pr list --repo "$GITHUB_REPOSITORY" --label "auto-sync" --state open --json number --jq 'length')
          if [ "$OPEN" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next desktop version
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        id: version
        run: |
          CUR=$(jq -r .version package.json)
          NEXT=$(echo "$CUR" | awk -F. '{print $1"."$2"."$3+1}')
          echo "current=$CUR" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"   >> "$GITHUB_OUTPUT"

      - name: Sanity-check that bundled patches still apply
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        id: patch-check
        continue-on-error: true
        run: |
          set -e
          cd vendor/hermes-web-ui
          git checkout "${{ steps.diff.outputs.new_sha }}"
          npm ci --no-audit --no-fund
          npm run build
          npm prune --omit=dev
          cd ../..
          if node scripts/apply-webui-patches.mjs 2>&1 | tee /tmp/patch.log; then
            if grep -q "anchor not found" /tmp/patch.log; then
              echo "patches_ok=false" >> "$GITHUB_OUTPUT"
            else
              echo "patches_ok=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "patches_ok=false" >> "$GITHUB_OUTPUT"
          fi
          cd vendor/hermes-web-ui
          git reset --hard "${{ steps.diff.outputs.new_sha }}"

      - name: Update submodule pointer + version + lockfile
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true'
        run: |
          git -C vendor/hermes-web-ui checkout "${{ steps.diff.outputs.new_sha }}"
          jq --arg v "${{ steps.version.outputs.next }}" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          npm install --package-lock-only --no-audit --no-fund || true

      # Fast path: patches OK → push commit + tag directly to main using PAT.
      # The PAT-driven push triggers release.yml (tag-trigger).
      - name: Push to main + tag (fast path, patches OK)
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true' && steps.patch-check.outputs.patches_ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          OLD_SHA: ${{ steps.diff.outputs.old_sha }}
          NEW_SHA: ${{ steps.diff.outputs.new_sha }}
          COMMIT_COUNT: ${{ steps.diff.outputs.commit_count }}
          OLD_VER: ${{ steps.version.outputs.current }}
          NEW_VER: ${{ steps.version.outputs.next }}
          OLD_UPSTREAM_VER: ${{ steps.diff.outputs.old_upstream_ver }}
          NEW_UPSTREAM_VER: ${{ steps.diff.outputs.new_upstream_ver }}
          UPSTREAM_TAG: ${{ steps.diff.outputs.upstream_tag }}
        run: bash .github/scripts/push-to-main.sh

      # Slow path: patches FAILED → open PR with needs-review for human review.
      - name: Open needs-review PR (slow path, patches broken)
        if: steps.diff.outputs.changed == 'true' && steps.existing.outputs.skip != 'true' && steps.patch-check.outputs.patches_ok != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_SHA: ${{ steps.diff.outputs.old_sha }}
          NEW_SHA: ${{ steps.diff.outputs.new_sha }}
          COMMIT_COUNT: ${{ steps.diff.outputs.commit_count }}
          OLD_VER: ${{ steps.version.outputs.current }}
          NEW_VER: ${{ steps.version.outputs.next }}
          PATCHES_OK: ${{ steps.patch-check.outputs.patches_ok }}
          OLD_UPSTREAM_VER: ${{ steps.diff.outputs.old_upstream_ver }}
          NEW_UPSTREAM_VER: ${{ steps.diff.outputs.new_upstream_ver }}
          UPSTREAM_TAG: ${{ steps.diff.outputs.upstream_tag }}
        run: bash .github/scripts/open-sync-pr.sh
